# Spring Application Configuration
spring.application.name=backend
spring.main.banner-mode=off

# ==========================================
# DEFAULT PROFILE: H2 In-Memory Database
# ==========================================
spring.datasource.url=jdbc:h2:mem:taskflowdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 Console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ==========================================
# SECURITY & JWT
# ==========================================
# Base64 encoded 256-bit secret key
taskflow.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Token valid for 24 Hours
taskflow.jwt.expiration-ms=86400000

# ==========================================
# LOGGING
# ==========================================
logging.level.org.springframework.security=INFO
logging.level.com.taskflow=DEBUG
