# Spring Application Configuration
spring.application.name=backend
spring.main.banner-mode=off

# ==========================================
# DEFAULT PROFILE: H2 In-Memory Database
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:taskflowdb;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update

# Enable H2 Console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ==========================================
# SECURITY & JWT
# ==========================================
# Base64 encoded 256-bit secret key
taskflow.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# Token valid for 24 Hours
taskflow.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ==========================================
# LOGGING
# ==========================================
logging.level.org.springframework.security=INFO
logging.level.com.taskflow=DEBUG
